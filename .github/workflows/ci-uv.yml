name: CI (uv)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Compile check
        run: uv run python -m py_compile bio_cartridge.py tools/*.py

      - name: CLI smoke check
        run: |
          uv run python tools/nli.py --dry-run --json "endometrial organoid papers"
          uv run python tools/shawn_bio_search_cli.py --help
